<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Та САМАЯ Россия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            position: relative;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('img/Baikal_landscape.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-toggle {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .menu-toggle .white{
            display: block;
            width: 100%;
            height: 5px;
            background-color: #EDF2F2;
            transition: all 0.3s ease;
        }

        .menu-toggle .blue{
            display: block;
            width: 100%;
            height: 5px;
            background-color: #669BBD;
            transition: all 0.3s ease;
        }

        .menu-toggle .red{
            display: block;
            width: 100%;
            height: 5px;
            background-color: #C2121F;
            transition: all 0.3s ease;
        }

        .logo {
            height: 60px;
            width: auto;
            top: 40px;
        }

        .hero-content {
            text-align: center;
            padding: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .hero-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;  /* height: 55vh;*/
            background-color: #000;
            z-index: 1000;
            transition: all 0.3s ease;
            padding: 60px 20px 20px;
            overflow-y: auto;
        }

        .mobile-menu.active {
            left: 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px; /* left: 20px;*/
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
        }

        .mobile-menu ul {
            list-style: none;
        }

        .mobile-menu li {
            margin-bottom: 15px;
        }

        .mobile-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .mobile-menu a:hover {
            color: #3498db;
            padding-left: 15px;
        }

        .mobile-menu a::before {
            content: "►";
            margin-right: 10px;
            font-size: 0.8rem;
        }

        

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .mobile-menu {
                width: 100%;
                left: -100%;
            }

            .header-top {
                padding: 10px 0;
            }

            .logo {
                height: 40px;
            }

            .section-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.5rem;
            }

            .hero-subtitle {
                font-size: 0.9rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .section-content p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="menu-toggle" id="menuToggle">
                <span class="white"></span>
                <span class="blue"></span>
                <span class="red"></span>
            </div>
            <img src="img/logo.png" alt="Логотип" class="logo">
        </div>

        <div class="hero-content">
            <h1 class="hero-title">Та САМАЯ Россия</h1>
            <p class="hero-subtitle">Кластер международных исторических проектов</p>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <span class="close-btn" id="closeBtn">×</span>
        <ul>
            <li><a href="#home">Главная</a></li>
            <li><a href="#team">Команда проекта</a></li>
            <li><a href="#news">Новости</a></li>
            <li><a href="#history">Исторические линии</a></li>
            <li><a href="#map">Интерактивная карта</a></li>
            <li><a href="#partners">Партнёры</a></li>
            <li><a href="#contacts">Контакты</a></li>
        </ul>
    </div>

    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const closeBtn = document.getElementById('closeBtn');

        menuToggle.addEventListener('click', function() {
            mobileMenu.classList.toggle('active');
        });

        closeBtn.addEventListener('click', function() {
            mobileMenu.classList.remove('active');
        });

        // Close menu when clicking on links
        const menuLinks = document.querySelectorAll('.mobile-menu a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function() {
                mobileMenu.classList.remove('active');
            });
        });

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                
                const targetId = this.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 70,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
