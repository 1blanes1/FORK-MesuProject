{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Та САМАЯ Россия</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
</head>
<body>
    <header>
        <div class="intro">
            <div class="video">
                <iframe src="https://kinescope.io/embed/3attdmsCAUxiQ2ocDB7Cco" 
                allow="autoplay; fullscreen; picture-in-picture; encrypted-media;
                gyroscope; accelerometer; clipboard-write; screen-wake-lock;"
                frameborder="0" allowfullscreen style="position: absolute;
                width: 100%; height: 100%; top: 0; left: 0;"></iframe>
                
            </div>


            <div class="header-top">
                <div class="menu-toggle" id="menuToggle">
                    <img src="{% static 'img/menu_button.png' %}" alt="Кнопка меню">
                </div>
                <img src="{% static 'img/logo.png' %}" alt="Логотип" class="logo">
            </div>

            <div class="hero-content">
                <h1 class="hero-title">Россия</h1>
                <p class="hero-subtitle">Кластер международных исторических проектов</p>
            </div>
        </div>
        
        
      



    </header>

    <div class="mobile-menu" id="mobileMenu">
        <span class="close-btn" id="closeBtn">×</span>
        <ul>
            <li><a href="#home">Главная</a></li>
            <li><a href="#team">Команда проекта</a></li>
            <li><a href="#news">Новости</a></li>
            <li><a href="#history">Исторические линии</a></li>
            <li><a href="#map">Интерактивная карта</a></li>
            <li><a href="#partners">Партнёры</a></li>
            <li><a href="#contacts">Контакты</a></li>
        </ul>
    </div>

    <div>
        <h1>1</h1>
        <h1>1</h1>
        <h1>1</h1>
        <h1>1</h1>
        <h1>1</h1>
    </div>

    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const closeBtn = document.getElementById('closeBtn');

        menuToggle.addEventListener('click', function() {
            mobileMenu.classList.toggle('active');
        });

        closeBtn.addEventListener('click', function() {
            mobileMenu.classList.remove('active');
        });

        // Close menu when clicking on links
        const menuLinks = document.querySelectorAll('.mobile-menu a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function() {
                mobileMenu.classList.remove('active');
            });
        });

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                
                const targetId = this.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 70,
                        behavior: 'smooth'
                    });
                }
            });
        });

        
    </script>
</body>
</html>
